name: tutorly
description: "A full featured tutoring app made with Flutter and Firebase 🍀"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  file_picker: ^8.0.3
  image_picker: ^1.1.2
  bloc: ^9.0.0
  equatable: ^2.0.7 
  flutter_bloc: ^9.1.0
  storybook_flutter: ^0.14.1
  firebase_auth: ^5.0.0
  firebase_core: ^3.0.0
  firebase_storage: ^12.0.0
  cloud_firestore: ^5.6.5
  shared_preferences: ^2.5.3
  cached_network_image: ^3.4.1
  delayed_display: ^2.0.0
  shimmer: ^3.0.0
  wave_divider: ^0.0.3
  form_builder_validators: ^11.1.2
  flutter_form_builder: ^10.0.1
  sign_button: ^2.0.6
  awesome_dialog: ^3.2.1
  easy_stepper: ^0.8.5+1
  flip_card: ^0.7.0
  patterns_canvas: ^0.5.0
  animated_text_kit: ^4.2.3
  rive: ^0.13.20
  meta: ^1.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/shared/
    - assets/images/app/
    - assets/images/onboarding/
    - assets/audio/intro/
    - assets/animations/shared/
    - assets/animations/onboarding/